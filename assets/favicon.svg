<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 130" width="100%" height="100%">
  <!-- Cloud Outline -->
  <path d="M 50 120 L 150 120 a 35 35 0 0 0 8 -68 a 55 55 0 0 0 -108 -2 a 35 35 0 0 0 -2 70 z" fill="#ffffff" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Left person (Light Blue) -->
  <circle cx="68" cy="72" r="14.5" fill="#bae6f1"/>
  <path d="M 45 120 c 0 -24 8 -32 23 -32 c 15 0 23 8 23 32 z" fill="#bae6f1"/>
  
  <!-- Right person (Teal) -->
  <circle cx="132" cy="72" r="14.5" fill="#7cc6bf"/>
  <path d="M 109 120 c 0 -24 8 -32 23 -32 c 15 0 23 8 23 32 z" fill="#7cc6bf"/>

  <!-- Center person (Medium Blue) with thick white outline separating it -->
  <!-- paint-order makes the stroke go underneath the fill -->
  <circle cx="100" cy="62" r="17.5" fill="#4286b7" stroke="#ffffff" stroke-width="4" paint-order="stroke fill"/>
  <path d="M 74 120 c 0 -30 9 -42 26 -42 c 17 0 26 12 26 42 z" fill="#4286b7" stroke="#ffffff" stroke-width="4" paint-order="stroke fill"/>
</svg>
